<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <style>
        .contents {width:400px; margin:30px auto; border:1px solid #000;}
        .contents img {width:100%;}
        .contents .quiz {background-color: aqua;}
        .contents .info {background-color: orangered;}
        /* flex */ 
        .flex {
            display:flex; /* quiz + info 정렬위한준비 */
            gap:10px;
            }
            .flex .quiz {
                flex:1; /* width:50%; */
                display:flex; /* h2+ol+btn 정렬위한준비 */
                flex-flow:row wrap;
            }
        .flex .quiz > * {width:50%;}
        .flex .quiz h2 {background:salmon;}
        .flex .quiz ol {background: orange;}
        .flex .quiz #btn {background:palegoldenrod; height:50px;}
        .flex .info {flex:1; /* width:50%; */ }
        /* grid */ 
        .grid {
            display:grid; /* quiz + info 정렬위한준비 */
            grid-template-columns:1fr 1fr;
            /* grid-template-rows:100px 200px ; */
            gap:10px;
        }
        /* grid 표의 재배치를 flex보다 더 쉽게 : 단위 tr */
        .grid .quiz {
            display:grid; /* h2+ol+btn 정렬위한 부모명령 */
            /* grid-template-columns:1fr 1fr;
            grid-template-rows:1fr 50px; */
            grid-template-areas:
            'title .'
            'list btn';
            grid-template-columns:50px 1fr;
            grid-template-rows:1fr 150px;
        }
        .grid .quiz h2 {
            grid-area:title;
            background:salmon;
        }
        .grid .quiz ol {
            grid-area:list;
            background:orange;
        }
        .grid .quiz #btn {
            grid-area:btn;
            background:palegoldenrod;
        }
        .grid .info {}
        /* 
        정렬자식이 2개 이상이고 한 방향(수평,수직)으로만 정렬 -> flex or grid
        정렬자식이 3개 이상이고 반응형 기기에 따라 재배열 자유롭게 정렬 -> grid
        */
    </style>
</head>
<body>
    <div class="contents flex">
        <div class="quiz">
            <h2>퀴즈제목</h2>
            <ol>
                <li>30</li>
                <li>40</li>
                <li>50</li>
            </ol>
            <button type="button" id="btn">제출</button>
        </div>
        <div class="info">
            <img src="./img/quiz_contents.png" alt="">
            <p></p>
        </div>
    </div>
    <div class="contents grid">
        <div class="quiz">
            <h2>퀴즈제목</h2>
            <ol>
                <li>30</li>
                <li>40</li>
                <li>50</li>
            </ol>
            <button type="button" id="btn">제출</button>
        </div>
        <div class="info">
            <img src="./img/quiz_contents.png" alt="">
            <p></p>
        </div>
    </div>
</body>
</html>
